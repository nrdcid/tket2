name: Build and publish docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

env:
  UV_VERSION: "0.9.7"
  UV_FROZEN: 1
  # Path to the cached tket-c-api library
  # When this envvar is set, the `./.github/actions/tket-c-api` action **must** be run to fetch the artifacts
  # This config is not required, but speeds up the build by caching the tket-c-api library
  # The alternative is to install conan and remove the env var
  HUGRENV_VERSION: "0.3.1"
  HUGRENV_ROOT: "/tmp/hugrverse"
  HUGRENV_PLATFORM: "manylinux_2_28_x86_64"
  TKET_C_API_PATH: "/tmp/hugrverse"
  LD_LIBRARY_PATH: "/tmp/hugrverse/lib:/tmp/hugrverse/lib64"
  LLVM_SYS_211_PREFIX: "/tmp/hugrverse"



jobs:
  # Check if changes were made to the relevant files.
  # Always returns true if running on the default branch, to ensure all changes are thoroughly checked.
  changes:
    name: Check for changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python || github.event_name != 'pull_request' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/check-changes
        id: filter
  test:
    name: Test sphinx docs build
    needs: [changes]
    if: ${{ needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: extractions/setup-just@v3
        with:
          just-version: "1.40.0"


      - name: Install compliant tket1
        run: |
          mkdir -p $HUGRENV_ROOT
          curl -L https://github.com/Quantinuum/hugrverse-env/releases/download/v${HUGRENV_VERSION}/hugrenv-tket-${HUGRENV_PLATFORM}.tar.gz \
            | tar xz -C $HUGRENV_ROOT --strip-components=1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Run the docs build
        run: |
          just build-pydocs

      - name: Upload artifact.
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./tket-py/docs/build

  publish:
    name: Publish docs.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: ${{ needs.changes.outputs.python == 'true' && github.event_name == 'push' }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages.
        id: deployment
        uses: actions/deploy-pages@v5
